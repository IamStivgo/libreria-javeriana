services:
  # ─── Base de datos ────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: libreria_javeriana_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: libreria_user
      POSTGRES_PASSWORD: libreria_password
      POSTGRES_DB: library
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U libreria_user -d library"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API (Fastify) ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: libreria_javeriana_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://libreria_user:libreria_password@postgres:5432/library
      DEFAULT_LOAN_DAYS: 14
    ports:
      - "3000:3000"

volumes:
  postgres_data:
    driver: local
