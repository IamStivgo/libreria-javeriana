services:
  postgres:
    image: postgres:15-alpine
    container_name: libreria_javeriana_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: libreria_user
      POSTGRES_PASSWORD: libreria_password
      POSTGRES_DB: library
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U libreria_user -d library"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
